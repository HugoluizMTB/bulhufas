services:
  bulhufas:
    build: .
    ports:
      - "8420:8420"
    volumes:
      - bulhufas-data:/data
    environment:
      - PORT=8420
      - DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8420/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

volumes:
  bulhufas-data:
